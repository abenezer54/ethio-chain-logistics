name: ethio-chain-logistics-app

services:
  postgres:
    image: postgres:16-alpine
    container_name: ethio_chain_app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ethio_chain}
      POSTGRES_USER: ${POSTGRES_USER:-ethio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ethio_pass}
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ethio_user} -d ${POSTGRES_DB:-ethio_chain}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrate
    container_name: ethio_chain_app_migrations
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "postgres",
        "postgres://${POSTGRES_USER:-ethio_user}:${POSTGRES_PASSWORD:-ethio_pass}@postgres:5432/${POSTGRES_DB:-ethio_chain}?sslmode=disable",
        "up",
      ]
    restart: "no"

  upload-permissions:
    image: alpine:3.20
    container_name: ethio_chain_app_upload_permissions
    command: ["sh", "-c", "mkdir -p /app/uploads && chown -R 65534:65534 /app/uploads"]
    volumes:
      - app_uploads:/app/uploads
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ethio_chain_app_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ethio_user}:${POSTGRES_PASSWORD:-ethio_pass}@postgres:5432/${POSTGRES_DB:-ethio_chain}?sslmode=disable
      API_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      UPLOAD_DIR: /app/uploads
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      GIN_MODE: ${GIN_MODE:-release}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      upload-permissions:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8080}
    container_name: ethio_chain_app_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ethio_chain_app_pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  app_postgres_data:
  app_uploads:
