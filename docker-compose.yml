name: ethio-chain-logistics-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: ethio_chain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ethio_chain}
      POSTGRES_USER: ${POSTGRES_USER:-ethio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ethio_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ethio_user} -d ${POSTGRES_DB:-ethio_chain}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migrate
    container_name: ethio_chain_migrations
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "postgres",
        "postgres://${POSTGRES_USER:-ethio_user}:${POSTGRES_PASSWORD:-ethio_pass}@postgres:5432/${POSTGRES_DB:-ethio_chain}?sslmode=disable",
        "up",
      ]
    restart: "no"

  backend:
    image: golang:1.23-alpine
    container_name: ethio_chain_backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ethio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ethio_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ethio_chain}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://${POSTGRES_USER:-ethio_user}:${POSTGRES_PASSWORD:-ethio_pass}@postgres:5432/${POSTGRES_DB:-ethio_chain}?sslmode=disable
      API_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      UPLOAD_DIR: /app/uploads
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      GIN_MODE: ${GIN_MODE:-debug}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    command: ["go", "run", "./cmd/api"]

volumes:
  postgres_data:
  go_mod_cache:
